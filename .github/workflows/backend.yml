name: API CI

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v6

      - name: Run API tests
        run: ./gradlew test
