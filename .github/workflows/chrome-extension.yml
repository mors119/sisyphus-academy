name: Chrome Extension CI

on:
  pull_request:
    paths:
      - 'chrome-extension/**'

  push:
    branches:
      - main
    paths:
      - 'chrome-extension/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: chrome-extension

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
