name: Frontend CI

on:
  pull_request:
    paths:
      - 'apps/sisyphus-web/**'

  push:
    branches:
      - main
    paths:
      - 'apps/sisyphus-web/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/sisyphus-web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - run: npm ci
      - run: npm run build
