name: Web CI

on:
  pull_request:
    paths:
      - 'apps/web/**'
      - '.github/workflows/frontend.yml'
  push:
    branches:
      - main
    paths:
      - 'apps/web/**'
      - '.github/workflows/frontend.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
