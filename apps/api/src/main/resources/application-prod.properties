spring.application.name=backend
server.port=8080
server.forward-headers-strategy=framework

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.default_batch_fetch_size=50
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.enabled=true
spring.flyway.default-schema=public
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=1

jwt.secret=${JWT_SECRET}
jwt.expiration=900000
jwt.refresh-expiration=604800000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USER}
spring.mail.password=${MAIL_PASS}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.default-encoding=UTF-8

mail.from.address=${MAIL_USER}
mail.from.name=${MAIL_FROM_NAME:SISYPHUS}

app.hosts.app=${APP_HOST}
app.hosts.api=${API_HOST}
app.hosts.img=${IMG_HOST}
app.hosts.chrome-extension=${C_EX_HOST}
app.image.public-base=${IMAGE_PUBLIC_BASE}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.upload.allowed-extensions=${APP_UPLOAD_ALLOWED_EXTENSIONS}

file.static-enabled=true
file.access-url-prefix=/uploads/images/
file.upload-dir=${FILE_UPLOAD_DIR:/data/uploads/images}
