spring.main.allow-bean-definition-overriding=true

spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false

spring.security.oauth2.client.registration.google.client-id=dummy
spring.security.oauth2.client.registration.google.client-secret=dummy
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost/login/oauth2/code/google
spring.security.oauth2.client.registration.google.scope=openid,profile,email

spring.security.oauth2.client.registration.naver.client-id=dummy
spring.security.oauth2.client.registration.naver.client-secret=dummy
spring.security.oauth2.client.registration.naver.redirect-uri=http://localhost/login/oauth2/code/naver
spring.security.oauth2.client.registration.naver.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.naver.scope=name,email
spring.security.oauth2.client.registration.naver.client-name=Naver

spring.security.oauth2.client.registration.kakao.client-id=dummy
spring.security.oauth2.client.registration.kakao.client-secret=dummy
spring.security.oauth2.client.registration.kakao.client-authentication-method=none
spring.security.oauth2.client.registration.kakao.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.kakao.redirect-uri=http://localhost/login/oauth2/code/kakao
spring.security.oauth2.client.registration.kakao.scope=profile_nickname,account_email
spring.security.oauth2.client.registration.kakao.client-name=Kakao

spring.security.oauth2.client.provider.google.authorization-uri=https://dummy
spring.security.oauth2.client.provider.google.token-uri=https://dummy
spring.security.oauth2.client.provider.google.user-info-uri=https://dummy
spring.security.oauth2.client.provider.google.user-name-attribute=sub

spring.security.oauth2.client.provider.naver.authorization-uri=https://dummy
spring.security.oauth2.client.provider.naver.token-uri=https://dummy
spring.security.oauth2.client.provider.naver.user-info-uri=https://dummy
spring.security.oauth2.client.provider.naver.user-name-attribute=response

spring.security.oauth2.client.provider.kakao.authorization-uri=https://dummy
spring.security.oauth2.client.provider.kakao.token-uri=https://dummy
spring.security.oauth2.client.provider.kakao.user-info-uri=https://dummy
spring.security.oauth2.client.provider.kakao.user-name-attribute=id

jwt.secret=test-secret
jwt.expiration=900000
jwt.refresh-expiration=604800000

app.hosts.app=http://localhost:3000
app.hosts.api=http://localhost:8080
app.hosts.img=http://localhost:8080
app.hosts.chrome-extension=chrome-extension://test

app.image.public-base=http://localhost:8080

app.cors.allowed-origins=http://localhost:3000

app.upload.allowed-extensions=png,jpg,jpeg

file.upload-dir=/tmp/uploads
file.access-url-prefix=/uploads/images/
file.static-enabled=false
