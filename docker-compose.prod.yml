name: sisyphus-stack

services:
  postgres:
    image: postgres:16
    container_name: sisy-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sisy-redis
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  backend:
    image: ${BACKEND_IMAGE}
    container_name: sisy-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod,oauth

      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

      JWT_SECRET: ${JWT_SECRET}

      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SSL: ${REDIS_SSL:-false}

      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASS: ${MAIL_PASS}

      APP_HOST: ${APP_HOST}
      API_HOST: ${API_HOST}
      IMG_HOST: ${IMG_HOST}

      C_EX_HOST: ${C_EX_HOST}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}

      APP_UPLOAD_ALLOWED_EXTENSIONS: png,jpg,jpeg,webp,gif
      FILE_UPLOAD_DIR: /data/uploads/images

      IMAGE_PUBLIC_BASE: ${IMAGE_PUBLIC_BASE}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}

    volumes:
      - uploads:/data/uploads/images
    expose:
      - '8080'
    restart: unless-stopped

  web:
    image: ${WEB_IMAGE}
    container_name: sisy-web
    depends_on:
      - backend
    expose:
      - '80'
    restart: unless-stopped

  nginx:
    image: ${NGINX_IMAGE}
    platform: ${NGINX_PLATFORM:-linux/amd64}
    container_name: sisy-nginx
    depends_on:
      - web
      - backend
    ports:
      - '80:80'
    volumes:
      - uploads:/data/uploads/images:ro
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploads:
